<!DOCTYPE html>
<html>
<head>
<title>Chatbot UI</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f4f6f9;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.chat-container {
    width: 400px;
    background: white;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}

h2 {
    text-align: center;
}

#chat {
    height: 300px;
    overflow-y: auto;
    border: 1px solid #ddd;
    padding: 10px;
    margin-bottom: 10px;
    border-radius: 5px;
}

.user {
    text-align: right;
    color: blue;
}

.bot {
    text-align: left;
    color: green;
}

input {
    width: 70%;
    padding: 8px;
}

button {
    padding: 8px 12px;
    background: blue;
    color: white;
    border: none;
    cursor: pointer;
}
</style>

</head>
<body>

<div class="chat-container">
<h2>Chatbot UI Project - By khushbusingh</h2>

<div id="chat"></div>

<input type="text" id="input" placeholder="Type message">
<button onclick="send()">Send</button>
</div>

<script>
function send() {
    let input = document.getElementById("input").value;
    let chat = document.getElementById("chat");

    chat.innerHTML += "<p class='user'><b>You:</b> " + input + "</p>";
    chat.innerHTML += "<p class='bot'><b>Bot:</b> You said " + input + "</p>";

    document.getElementById("input").value = "";
}
</script>

</body>
</html>

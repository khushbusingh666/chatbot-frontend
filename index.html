<!DOCTYPE html>
<html>
<head>
    <title>AI Career Guidance Bot</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #1e1e2f;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .chat-container {
            width: 450px;
            background: #2a2a40;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0px 0px 20px rgba(0,0,0,0.4);
        }

        .header {
            padding: 15px;
            text-align: center;
            font-weight: bold;
            background: #222233;
            color: white;
            font-size: 16px;
        }

        #chatbox {
            padding: 15px;
            height: 400px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .message {
            padding: 10px;
            margin: 6px 0;
            border-radius: 10px;
            max-width: 75%;
            font-size: 14px;
            word-wrap: break-word;
        }

        .user {
            background: #4caf50;
            color: white;
            align-self: flex-end;
        }

        .bot {
            background: #3a3a55;
            color: white;
            align-self: flex-start;
        }

        .timestamp {
            font-size: 10px;
            opacity: 0.6;
            margin-top: 3px;
        }

        .input-area {
            display: flex;
            padding: 10px;
            background: #222233;
        }

        #userInput {
            flex: 1;
            padding: 8px;
            border-radius: 8px;
            border: none;
            outline: none;
            font-size: 14px;
        }

        button {
            margin-left: 10px;
            padding: 8px 15px;
            border-radius: 8px;
            border: none;
            background: #4caf50;
            color: white;
            cursor: pointer;
            font-size: 14px;
        }

        button:hover {
            background: #45a049;
        }
    </style>
</head>

<body>

<div class="chat-container">
    <div class="header">
        AI Career Guidance Bot
    </div>

    <div id="chatbox"></div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Ask your career question...">
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>

function getTime() {
    let now = new Date();
    return now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
}

function sendMessage() {

    let input = document.getElementById("userInput");
    let message = input.value.trim();
    if(message === "") return;

    let chatbox = document.getElementById("chatbox");

    // User message
    chatbox.innerHTML += `
        <div class="message user">
            ${message}
            <div class="timestamp">${getTime()}</div>
        </div>
    `;

    // Typing indicator
    chatbox.innerHTML += `
        <div class="message bot" id="typing">
            AI is typing...
        </div>
    `;

    chatbox.scrollTop = chatbox.scrollHeight;

    fetch("http://127.0.0.1:5000/chat", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({message: message})
    })
    .then(response => response.json())
    .then(data => {

        document.getElementById("typing").remove();

        chatbox.innerHTML += `
            <div class="message bot">
                ${data.reply}
                <div class="timestamp">${getTime()}</div>
            </div>
        `;

        chatbox.scrollTop = chatbox.scrollHeight;
    });

    input.value = "";
}

// Enter key support
document.getElementById("userInput")
.addEventListener("keypress", function(event) {
    if (event.key === "Enter") {
        sendMessage();
    }
});

</script>

</body>
</html>

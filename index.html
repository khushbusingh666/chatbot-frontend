<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI Career Chatbot</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #343541;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.chat-wrapper {
    width: 500px;
    height: 600px;
    background: #444654;
    display: flex;
    flex-direction: column;
    border-radius: 12px;
    overflow: hidden;
}

.header {
    background: #202123;
    color: white;
    padding: 15px;
    text-align: center;
    font-weight: bold;
}

.chat-box {
    flex: 1;
    padding: 15px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
}

.message {
    max-width: 75%;
    padding: 10px 14px;
    margin-bottom: 10px;
    border-radius: 10px;
    font-size: 14px;
    line-height: 1.4;
}

.user {
    align-self: flex-end;
    background: #19c37d;
    color: white;
    border-bottom-right-radius: 0;
}

.bot {
    align-self: flex-start;
    background: #3e3f4b;
    color: white;
    border-bottom-left-radius: 0;
}

.input-area {
    display: flex;
    padding: 10px;
    background: #202123;
}

input {
    flex: 1;
    padding: 10px;
    border-radius: 8px;
    border: none;
    outline: none;
    font-size: 14px;
}

button {
    margin-left: 8px;
    padding: 10px 15px;
    border: none;
    border-radius: 8px;
    background: #19c37d;
    color: white;
    cursor: pointer;
    font-weight: bold;
}

button:hover {
    background: #15a96b;
}
</style>
</head>

<body>

<div class="chat-wrapper">
    <div class="header">
        AI Career Guidance Bot - Khushbu Singh
    </div>

    <div class="chat-box" id="chatBox"></div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Ask me anything..." onkeypress="handleEnter(event)">
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
function handleEnter(event) {
    if (event.key === "Enter") {
        sendMessage();
    }
}

function sendMessage() {
    let inputField = document.getElementById("userInput");
    let message = inputField.value.trim().toLowerCase();
    if (message === "") return;

    addMessage(message, "user");
    inputField.value = "";

    setTimeout(() => {
        let reply = generateReply(message);
        addMessage(reply, "bot");
    }, 500);
}

function addMessage(text, sender) {
    let chatBox = document.getElementById("chatBox");
    let msgDiv = document.createElement("div");
    msgDiv.classList.add("message", sender);
    msgDiv.textContent = text;
    chatBox.appendChild(msgDiv);
    chatBox.scrollTop = chatBox.scrollHeight;
}

function generateReply(input) {
    if (input === "hi" || input === "hello") {
        return "Hello 👋 I am your AI Career Guidance Bot. How can I help you?";
    }
    else if (input.includes("ai")) {
        return "AI is a powerful field. Learn Python, Machine Learning, and Deep Learning.";
    }
    else if (input.includes("web")) {
        return "For Web Development, learn HTML, CSS, JavaScript, and React.";
    }
    else if (input.includes("job")) {
        return "To get a job, build strong projects, upload to GitHub, and practice DSA daily.";
    }
    else if (input.includes("language")) {
        return "Python is best for beginners. JavaScript is best for web development.";
    }
    else {
        return "I am still learning. Please ask about AI, Web, Jobs, or Programming.";
    }
}
</script>

</body>
</html>
